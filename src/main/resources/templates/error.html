<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Error')}"></head>
<body class="bg-body-secondary bg-opacity-10">

  <!-- NAVBAR -->
  <nav th:replace="~{fragments :: navbar}"></nav>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6 text-center">
        
        <div class="card border-0 shadow-sm rounded-4 p-5 bg-card">
          <div class="mb-4">
            <div class="bg-danger bg-opacity-10 text-danger rounded-circle p-4 d-inline-flex align-items-center justify-content-center mb-3" style="width: 96px; height: 96px;">
              <i class="bi bi-exclamation-octagon fs-1"></i>
            </div>
            <h1 class="fw-bold mb-2">Oops!</h1>
            <h3 class="fw-semibold text-muted mb-4">Something went wrong</h3>
          </div>

          <p class="text-body-secondary mb-5">
            The request couldn't be completed, or the page you are looking for doesn't exist. If you were attempting to perform an action, you might have been timed out or encountered a security check.
          </p>

          <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="/" class="btn btn-primary rounded-pill px-5 py-2.5 fw-semibold shadow">
              <i class="bi bi-house-door-fill me-2"></i>Back to Home Screen
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer th:replace="~{fragments :: footer}"></footer>

  <!-- SCRIPTS -->
  <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
