<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Post an Ad')}"></head>
<body class="bg-body-secondary bg-opacity-10">

  <!-- NAVBAR -->
  <nav th:replace="~{fragments :: navbar}"></nav>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        
        <!-- CARD CONTAINER -->
        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
          <div class="d-flex align-items-center mb-4">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-3 d-flex align-items-center justify-content-center me-3" style="width: 56px; height: 56px;">
              <i class="bi bi-tag-fill fs-3"></i>
            </div>
            <div>
              <h2 class="fw-bold mb-1">Create a New Listing</h2>
              <p class="text-muted mb-0">List your item for fellow university students to buy</p>
            </div>
          </div>
          
          <hr class="mb-4 opacity-50" />

          <form th:action="@{/new-listing}"
                th:object="${listing}"
                method="post"
                enctype="multipart/form-data">
                
            <div class="row">
              <!-- Item Title -->
              <div class="col-md-8 mb-4">
                <label for="title" class="form-label fw-semibold">Item Title</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent"><i class="bi bi-type text-muted"></i></span>
                  <input type="text"
                         class="form-control"
                         th:field="*{title}"
                         required
                         placeholder="e.g., Calculus 101 Textbook" />
                </div>
                <div class="form-text">Keep it short and descriptive.</div>
              </div>

              <!-- Item Price -->
              <div class="col-md-4 mb-4">
                <label for="price" class="form-label fw-semibold">Price (€)</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent"><i class="bi bi-currency-euro text-muted"></i></span>
                  <input type="number"
                         step="0.01"
                         min="0"
                         class="form-control"
                         th:field="*{price}"
                         required
                         placeholder="0.00" />
                </div>
              </div>
            </div>

            <div class="row">
              <!-- Item Category -->
              <div class="col-md-6 mb-4">
                <label for="category" class="form-label fw-semibold">Category</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent"><i class="bi bi-list-task text-muted"></i></span>
                  <select class="form-select"
                          th:field="*{category.id}"
                          required>
                    <option value="" disabled selected>Select category</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                  </select>
                </div>
              </div>

              <!-- Upload Image -->
              <div class="col-md-6 mb-4">
                <label for="upload-image" class="form-label fw-semibold">Upload Image</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent"><i class="bi bi-camera text-muted"></i></span>
                  <input type="file"
                         class="form-control"
                         name="imageFile"
                         accept="image/*"
                         required />
                </div>
                <div class="form-text">Choose a clean image of the item. Max 5MB.</div>
              </div>
            </div>

            <!-- Item Description -->
            <div class="mb-4">
              <label for="description" class="form-label fw-semibold">Description</label>
              <textarea class="form-control"
                        th:field="*{description}"
                        rows="4"
                        required
                        placeholder="Provide details about condition, usage, meets location, or anything else buyers might want to know..."></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4 pt-3 border-top">
              <a href="/" class="btn btn-outline-secondary rounded-pill px-4 me-md-2 py-2">Cancel</a>
              <button type="submit" class="btn btn-primary rounded-pill px-5 py-2 fw-semibold">
                <i class="bi bi-check-lg me-2"></i>Post Listing
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer th:replace="~{fragments :: footer}"></footer>

  <!-- SCRIPTS -->
  <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
