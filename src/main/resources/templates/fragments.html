<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${title} + ' - UniTrade'">UniTrade</title>
  <link rel="icon" type="image/png" th:href="@{/favicon.png}" />
  
  <!-- Inline script to prevent theme flash -->
  <script>
    (function() {
      const storedTheme = localStorage.getItem('theme');
      const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const theme = storedTheme || preferredTheme;
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>

  <!-- Google Fonts & Bootstrap/Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Premium Custom Styling -->
  <style>
    :root {
      --font-family: 'Plus Jakarta Sans', sans-serif;
    }
    body {
      font-family: var(--font-family);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* Elegant Navbar Styling */
    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    [data-bs-theme="dark"] .glass-nav {
      background: rgba(33, 37, 41, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    /* Custom listing card hover animations */
    .listing-card {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
      border: 1px solid rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }
    [data-bs-theme="dark"] .listing-card {
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .listing-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08) !important;
    }
    [data-bs-theme="dark"] .listing-card:hover {
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3) !important;
    }
    .card-img-container {
      position: relative;
      overflow: hidden;
    }
    .listing-card img {
      transition: transform 0.5s ease;
    }
    .listing-card:hover img {
      transform: scale(1.05);
    }
    
    /* Category pills */
    .category-pill {
      border-radius: 50px;
      padding: 0.5rem 1.25rem;
      font-weight: 500;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(0, 0, 0, 0.08);
      color: var(--bs-body-color);
      background-color: var(--bs-body-bg);
    }
    [data-bs-theme="dark"] .category-pill {
      border-color: rgba(255, 255, 255, 0.1);
    }
    .category-pill:hover, .category-pill.active {
      background-color: var(--bs-primary);
      color: white;
      border-color: var(--bs-primary);
      box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);
    }
    
    /* Badge styling */
    .badge-status {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      border-radius: 50px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 10px;
    }
    [data-bs-theme="dark"] ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
    }
    
    /* Hero Section Gradient */
    .hero-banner {
      background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
      color: white;
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 10px 30px rgba(13, 110, 253, 0.15);
    }
    [data-bs-theme="dark"] .hero-banner {
      background: linear-gradient(135deg, #1b263b 0%, #0d1b2a 100%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    /* Modern unified search bar */
    .search-group {
      border: 1px solid var(--bs-border-color-translucent);
      border-radius: 50px;
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background-color: var(--bs-body-bg);
    }
    .search-group:focus-within {
      border-color: var(--bs-primary) !important;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }
    .search-group .form-control {
      border: none !important;
      background-color: transparent !important;
      box-shadow: none !important;
    }
    .search-group .input-group-text {
      border: none !important;
      background-color: transparent !important;
    }
    .search-group .btn {
      border-radius: 0 50px 50px 0 !important;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR FRAGMENT -->
  <nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top glass-nav py-3">
    <div class="container">
      <a class="navbar-brand fw-extrabold fs-3 text-primary d-flex align-items-center" href="/">
        <i class="bi bi-wallet2 me-2"></i>UniTrade
      </a>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <!-- Keyword Search Bar -->
        <form class="d-flex mx-auto col-lg-5 my-2 my-lg-0" action="/" method="get">
          <div class="input-group search-group">
            <span class="input-group-text text-muted bg-transparent ps-3 pe-2">
              <i class="bi bi-search"></i>
            </span>
            <input class="form-control ps-1" type="search" name="search" th:value="${searchQuery}" placeholder="What are you looking for today?" aria-label="Search" />
            <input type="hidden" name="category" th:value="${selectedCategory}" th:if="${selectedCategory != null}" />
            <button class="btn btn-primary fw-semibold" type="submit">Search</button>
          </div>
        </form>

        <ul class="navbar-nav align-items-lg-center ms-auto">
          <!-- Dark Mode Toggle Button -->
          <li class="nav-item me-2">
            <button class="btn btn-outline-secondary border-0 rounded-circle py-2 px-3" id="theme-toggler" title="Toggle theme">
              <i id="theme-icon" class="bi bi-sun-fill fs-5"></i>
            </button>
          </li>
          
          <!-- Shared Links -->
          <li class="nav-item">
            <a class="nav-link fw-semibold" href="/">All Listings</a>
          </li>

          <!-- Anonymous / Guest User Actions -->
          <li class="nav-item ms-lg-2" sec:authorize="isAnonymous()">
            <a class="btn btn-outline-primary me-2" href="/login">Login</a>
          </li>
          <li class="nav-item" sec:authorize="isAnonymous()">
            <a class="btn btn-primary" href="/register">Sign Up</a>
          </li>

          <!-- Authenticated User Actions -->
          <li class="nav-item dropdown ms-lg-3" sec:authorize="isAuthenticated()">
            <a class="nav-link dropdown-toggle fw-semibold d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-person-circle fs-5 me-2 text-primary"></i>
              <span sec:authentication="name" class="d-inline-block text-truncate" style="max-width: 120px;">Student</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userDropdown">
              <li>
                <a class="dropdown-item py-2" href="/new-listing">
                  <i class="bi bi-plus-circle me-2"></i>Post an Ad
                </a>
              </li>
              <li>
                <a class="dropdown-item py-2" href="/my-listings">
                  <i class="bi bi-grid-3x3-gap me-2"></i>Manage Ads
                </a>
              </li>
              <li>
                <a class="dropdown-item py-2" href="/inquiries">
                  <i class="bi bi-chat-left-text me-2"></i>Inquiries
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
                <a class="dropdown-item py-2 text-danger" href="javascript:void(0);" onclick="document.getElementById('logoutForm').submit();">
                  <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
              </li>
            </ul>
          </li>
          
          <!-- Post an Ad CTA -->
          <li class="nav-item ms-lg-3" sec:authorize="isAuthenticated()">
            <a class="btn btn-primary d-none d-lg-inline-block" href="/new-listing">
              <i class="bi bi-plus-lg me-1"></i>Post an Ad
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- FOOTER FRAGMENT -->
  <footer th:fragment="footer" class="py-5 mt-5 bg-body-tertiary border-top">
    <div class="container text-center">
      <p class="mb-2 fw-semibold text-primary"><i class="bi bi-wallet2 me-1"></i>UniTrade</p>
      <p class="text-muted small mb-0">&copy; 2026 UniTrade Platform. Built for University Students.</p>
    </div>
  </footer>

  <!-- SCRIPTS FRAGMENT -->
  <div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const getStoredTheme = () => localStorage.getItem('theme');
        const setStoredTheme = theme => localStorage.setItem('theme', theme);
        
        const getPreferredTheme = () => {
          const storedTheme = getStoredTheme();
          if (storedTheme) return storedTheme;
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };
        
        const setTheme = theme => {
          document.documentElement.setAttribute('data-bs-theme', theme);
          const themeIcon = document.getElementById('theme-icon');
          if (themeIcon) {
            themeIcon.className = theme === 'dark' ? 'bi bi-moon-stars-fill fs-5' : 'bi bi-sun-fill fs-5';
          }
        };
        
        const themeToggler = document.getElementById('theme-toggler');
        if (themeToggler) {
          themeToggler.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
            setStoredTheme(newTheme);
          });
        }
        
        // Initial setup for the icon
        setTheme(getPreferredTheme());
      });
    </script>
  </div>

</body>
</html>
